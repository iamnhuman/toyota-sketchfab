<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toyota Sketchfab Slider</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1116;
      --panel: rgba(0, 0, 0, 0.4);
      --panel-hover: rgba(0, 0, 0, 0.7);
      --panel-border: rgba(255, 255, 255, 0.22);
      --text: #f2f5ff;
      --muted: #c4cbe1;
      --btn-bg: rgba(12, 16, 26, 0.42);
      --btn-bg-hover: rgba(20, 26, 40, 0.62);
      --btn-border: rgba(255, 255, 255, 0.22);
      --btn-icon: #eef3ff;
      --controls-h: 32px;
      --brand-badge-size: 32px;
      --brand-left-offset: 18px;
      --brand-bottom-offset: 10px;
      --brand-gap: 10px;
      --side-ui-size: 32px;
      --side-ui-offset: 10px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 15% 10%, #1a2033 0%, #0f1116 50%, #090b10 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .bottom-controls {
      pointer-events: auto;
      position: fixed;
      left: 10px !important;
      right: auto !important;
      top: auto !important;
      bottom: calc(10px + var(--brand-badge-size) + 20px + 5px) !important;
      transform: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: auto;
      height: auto;
      max-width: min(52vw, 360px);
    }

    .arrow {
      flex: 0 0 var(--controls-h);
      width: var(--controls-h);
      height: var(--controls-h);
      border: none;
      border-radius: 999px;
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(5px);
      box-shadow: none;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .arrow:hover {
      background: var(--panel-hover);
    }

    .arrow:active { transform: scale(0.95); }

    .arrow-left {
      position: relative;
      left: auto;
      right: -1px;
    }

    .arrow-right {
      position: relative;
      right: auto;
      left: -1px;
    }

    .arrow-icon {
      width: 16px;
      height: 16px;
      display: block;
      transform: translateY(0.5px);
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
    }

    .arrow-icon path {
      fill: #ffffff;
      stroke: none;
    }

    .arrow:focus-visible {
      outline: none;
    }

    .caption {
      flex: 0 0 var(--controls-h);
      width: var(--controls-h);
      max-width: none;
      min-width: var(--controls-h);
      height: var(--controls-h);
      padding: 0;
      border-radius: 999px;
      background: var(--panel);
      border: none;
      text-align: center;
      backdrop-filter: blur(5px);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .title {
      display: none;
    }

    .meta {
      margin: 0;
      color: #ffffff;
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
      transform: none;
      white-space: nowrap;
    }

    @media (max-width: 900px) {}
  </style>
</head>
<body>
  <div class="slider">
    <iframe
      id="viewer"
      title="Toyota Sketchfab Slider"
      allowfullscreen
      mozallowfullscreen="true"
      webkitallowfullscreen="true"
      allow="autoplay; fullscreen; xr-spatial-tracking"
      xr-spatial-tracking
      execution-while-out-of-viewport
      execution-while-not-rendered
      web-share
    ></iframe>

    <div class="overlay">
      <div class="bottom-controls">
        <button id="prevBtn" class="arrow arrow-left" aria-label="Previous model">
          <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 4L8 12L16 20Z"></path></svg>
        </button>
        <div class="caption">
          <p id="modelTitle" class="title"></p>
          <p id="modelMeta" class="meta"></p>
        </div>
        <button id="nextBtn" class="arrow arrow-right" aria-label="Next model">
          <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4L16 12L8 20Z"></path></svg>
        </button>
      </div>
    </div>
  </div>

      { url: "https://sketchfab.com/3d-models/toyota-ae86-black-limited-kouki-80854ba302034431b517f523db328129", title: "Toyota AE86 Black Limited Kouki" },
      { url: "https://sketchfab.com/3d-models/toyota-supra-dekztrax-34-d86f2a93aaac4a79ac06c7f790255de6", title: "Toyota Supra DEKZTRAX [34]" },
      { url: "https://sketchfab.com/3d-models/toyota-hilux-revo-prerunner-2021-04ae6d8e07e84f55a9e1d7e3261be171", title: "Toyota Hilux Revo Prerunner 2021" },
      { url: "https://sketchfab.com/3d-models/toyota-kijang-innova-zenix-2023-highpoly-c8e1bbc9292b4e198dba839c32f02fa9", title: "Toyota Kijang Innova Zenix 2023 (highpoly)" },

      { url: "https://sketchfab.com/3d-models/toyota-supra-gt500-wwwvecarzcom-8b0fcf1219b84898a7da17073bf24bc6", title: "Toyota Supra GT500" },
      { url: "https://sketchfab.com/3d-models/2025-toyota-land-cruiser-250-b53e78d5e3474474a788e7ef4deccda0", title: "2025 Toyota Land Cruiser 250" },

      { url: "https://sketchfab.com/3d-models/toyota-gr-yaris-rally-wrc-wwwvecarzcom-1c2ce5ff548f4ab49d72183d1e0f2afe", title: "Toyota GR Yaris Rally WRC" },
      { url: "https://sketchfab.com/3d-models/toyota-corolla-2008-38096dd8774a4cfbac4dd6861d433ab0", title: "Toyota Corolla 2008" },
      { url: "https://sketchfab.com/3d-models/toyota-concept-i-687e61ceb62a48e897cd75312ae54868", title: "Toyota Concept-i" },
      { url: "https://sketchfab.com/3d-models/radio-for-toyota-b56801a6f2854f52846f9da98e489128", title: "Radio For Toyota" },
      { url: "https://sketchfab.com/3d-models/toyota-corolla-e170-2017-d87af59849814c5cb35a0c233f2c2f19", title: "Toyota Corolla E170 2017" },
      { url: "https://sketchfab.com/3d-models/toyota-van-1982-d3b5955e74cc4c619c4658a0e7104f42", title: "Toyota Van 1982" },
      { url: "https://sketchfab.com/3d-models/toyota-supra-gt500-2005-5304482b7dae47139228c9714f652a1d", title: "Toyota Supra GT500 (2005)" },

      { url: "https://sketchfab.com/3d-models/toyota-mark-x-interior-yuxdesign-high-polygon-1a35e1e2c88a4888a83fb9c175b44168", title: "Toyota Mark X Interior Yuxdesign high polygon" },

      { url: "https://sketchfab.com/3d-models/toyota-supra-gr-gt4-steering-wheel-b783e2d6c1eb4d9b89599cc523bdb170", title: "Toyota Supra GR GT4 Steering Wheel" },
      { url: "https://sketchfab.com/3d-models/toyota-yaris-echo-4-door-xp10-widebody-1c534c998a73467ba67ff88a2edc88b3", title: "Toyota Yaris / Echo 4-Door XP10 Widebody" },
      { url: "https://sketchfab.com/3d-models/drifting-ae86-slow-motion-animated-version-a2a20f8c319c4ecab8d1e34dcc1ae090", title: "Drifting AE86 - Slow Motion Animated Version" },
      { url: "https://sketchfab.com/3d-models/seratora-9bee33b9573444dda9d3fb0df2c2981e", title: "SERATORA" },
      { url: "https://sketchfab.com/3d-models/toyota-prius-prime-2023-highpoly-211315d8e62246e0b64498b14b8f153d", title: "Toyota Prius Prime 2023 Highpoly" },
      { url: "https://sketchfab.com/3d-models/toyota-supra-2020-c7547986dc2945828a908102e09d9836", title: "Toyota Supra 2020" }
    ];

    const iframe = document.getElementById("viewer");
    const titleEl = document.getElementById("modelTitle");
    const metaEl = document.getElementById("modelMeta");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function shuffled(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const playlist = [startModel, ...shuffled(models)];
    let current = 0;

    function toEmbedUrl(pageUrl) {
      if (pageUrl.includes("/models/") && pageUrl.includes("/embed")) {
        const embedUrl = new URL(pageUrl);
        embedUrl.searchParams.set("autostart", "1");
        embedUrl.searchParams.set("ui_theme", "dark");
        embedUrl.searchParams.set("ui_controls", "0");
        embedUrl.searchParams.set("ui_infos", "0");
        embedUrl.searchParams.set("ui_stop", "0");
        embedUrl.searchParams.set("ui_help", "0");
        embedUrl.searchParams.set("ui_settings", "0");
        embedUrl.searchParams.set("ui_inspector", "0");
        embedUrl.searchParams.set("ui_annotations", "0");
        embedUrl.searchParams.set("ui_vr", "0");
        embedUrl.searchParams.set("ui_fullscreen", "0");
        return embedUrl.toString();
      }

      const match = pageUrl.match(/-([a-f0-9]{32})(?:$|[/?#])/i);
      if (!match) return pageUrl;
      return "https://sketchfab.com/models/" + match[1] + "/embed?autostart=1&ui_theme=dark&ui_controls=0&ui_infos=0&ui_stop=0&ui_help=0&ui_settings=0&ui_inspector=0&ui_annotations=0&ui_vr=0&ui_fullscreen=0";
    }

    function render(index) {
      current = (index + playlist.length) % playlist.length;
      const model = playlist[current];
      iframe.src = toEmbedUrl(model.url);
      titleEl.textContent = model.title;
      metaEl.textContent = (current + 1) + "/" + playlist.length;
    }

    prevBtn.addEventListener("click", () => render(current - 1));
    nextBtn.addEventListener("click", () => render(current + 1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") render(current - 1);
      if (event.key === "ArrowRight") render(current + 1);
    });

    render(0);
  </script>
</body>
</html>
